<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lava Pet</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">

<div class="w-full max-w-sm md:max-w-md bg-white rounded-3xl shadow-xl overflow-hidden">

  <!-- Splash Screen -->
  <div id="splash" class="screen h-[600px] flex items-center justify-center bg-blue-700 text-white text-4xl font-bold tracking-tighter">
    lavapet
  </div>

  <!-- Login (Atualizado conforme a imagem) -->
  <div id="login" class="screen hidden p-8 flex flex-col items-center justify-center min-h-[500px]">
    <h1 class="text-2xl font-bold text-blue-600 mb-2">Lava Pet</h1>
    <p class="text-gray-400 text-sm text-center mb-8">O santuário digital para seu melhor amigo.</p>
    
    <div class="w-full space-y-4">
      <input type="email" id="email" placeholder="E-mail" 
             class="w-full p-4 bg-gray-50 rounded-xl border-none focus:ring-2 focus:ring-blue-400 outline-none text-gray-600">
      
      <input type="password" id="senha" placeholder="Senha" 
             class="w-full p-4 bg-gray-50 rounded-xl border-none focus:ring-2 focus:ring-blue-400 outline-none text-gray-600">
      
      <button onclick="validarLogin()" class="w-full bg-blue-500 hover:bg-blue-600 text-white py-4 rounded-xl font-medium transition-all flex items-center justify-center gap-2 shadow-lg shadow-blue-100">
        Entrar <span class="text-lg">→</span>
      </button>
    </div>
  </div>

  <!-- Pet -->
  <div id="pet" class="screen hidden p-6">
    <h2 class="text-xl font-bold mb-4 text-gray-700">Escolha o Pet</h2>
    <div class="grid grid-cols-2 gap-3">
      <div onclick="selectPet('Rex', this)" class="pet-card p-4 border rounded-2xl text-center cursor-pointer hover:bg-blue-50 transition-colors">
        🐶 Rex
      </div>
      <div onclick="goTo('novoPet')" class="p-4 border border-dashed rounded-2xl text-center cursor-pointer hover:bg-gray-50">
        ➕ Novo
      </div>
    </div>
    <button onclick="goTo('agendamento')" class="mt-6 w-full bg-blue-500 text-white py-3 rounded-xl font-bold">
      Continuar
    </button>
  </div>

  <!-- Novo Pet -->
  <div id="novoPet" class="screen hidden p-6">
    <h2 class="text-xl font-bold mb-4 text-gray-700">Novo Pet</h2>
    <input id="petNome" placeholder="Nome do Pet" class="w-full mb-3 p-3 bg-gray-50 rounded-xl outline-none">
    <input id="petRaca" placeholder="Raça" class="w-full mb-3 p-3 bg-gray-50 rounded-xl outline-none">
    <button onclick="salvarPet()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold">
      Salvar
    </button>
  </div>

  <!-- Agendamento -->
  <div id="agendamento" class="screen hidden p-6">
    <p class="text-gray-600">Agendando para: <strong id="petSelecionado" class="text-blue-600"></strong></p>
    <input id="date" type="date" class="w-full mt-4 p-3 bg-gray-50 rounded-xl outline-none">
    <div id="horarios" class="grid grid-cols-3 gap-2 mt-4"></div>
    <button onclick="finalizar()" class="mt-6 w-full bg-green-500 text-white py-3 rounded-xl font-bold">
      Finalizar
    </button>
  </div>

  <!-- Confirmação -->
  <div id="confirmacao" class="screen hidden p-10 text-center">
    <div class="text-5xl mb-4">🎉</div>
    <h2 class="text-2xl font-bold text-gray-800 mb-2">Agendado!</h2>
    <div class="bg-blue-50 p-4 rounded-2xl text-left space-y-1 mb-6">
      <p id="cPet" class="text-gray-700 font-medium"></p>
      <p id="cDate" class="text-gray-600 text-sm"></p>
      <p id="cTime" class="text-gray-600 text-sm"></p>
    </div>
    <button onclick="location.reload()" class="w-full bg-blue-100 text-blue-700 py-3 rounded-xl font-bold hover:bg-blue-200">
      Voltar ao Início
    </button>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
