<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lava Pet</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">

<div class="w-full max-w-sm md:max-w-2xl lg:max-w-4xl bg-white rounded-2xl shadow-lg overflow-hidden">

  <!-- Splash -->
  <div id="splash" class="screen h-[600px] flex items-center justify-center bg-blue-700 text-white text-4xl">
    lavapet
  </div>

  <!-- Login -->
  <div id="login" class="screen hidden p-6">
    <h1 class="text-center text-3xl text-blue-600 mb-4">Lava Pet</h1>
    <button onclick="goTo('pet')" class="w-full bg-blue-500 text-white py-3 rounded-lg">
      Entrar →
    </button>
  </div>

  <!-- Pet -->
  <div id="pet" class="screen hidden p-6">
    <h2 class="text-xl mb-4">Escolha o Pet</h2>

    <div class="grid grid-cols-2 gap-3">
      <div onclick="selectPet('Rex', this)" class="pet-card p-4 border rounded-lg text-center cursor-pointer">
        🐶 Rex
      </div>

      <div onclick="goTo('novoPet')" class="p-4 border rounded-lg text-center cursor-pointer">
        ➕ Novo
      </div>
    </div>

    <button onclick="goTo('agendamento')" class="mt-4 w-full bg-blue-500 text-white py-2 rounded">
      Continuar
    </button>
  </div>

  <!-- Novo Pet -->
  <div id="novoPet" class="screen hidden p-6">
    <input id="petNome" placeholder="Nome" class="w-full mb-3 p-2 bg-gray-100 rounded">
    <input id="petRaca" placeholder="Raça" class="w-full mb-3 p-2 bg-gray-100 rounded">

    <button onclick="salvarPet()" class="w-full bg-blue-500 text-white py-2 rounded">
      Salvar
    </button>
  </div>

  <!-- Agendamento -->
  <div id="agendamento" class="screen hidden p-6">
    <p>Pet: <strong id="petSelecionado"></strong></p>

    <input id="date" type="date" class="w-full mt-3 p-2 bg-gray-100 rounded">

    <div id="horarios" class="grid grid-cols-4 gap-2 mt-4"></div>

    <button onclick="finalizar()" class="mt-4 w-full bg-blue-500 text-white py-2 rounded">
      Finalizar
    </button>
  </div>

  <!-- Confirmação -->
  <div id="confirmacao" class="screen hidden p-6 text-center">
    <h2 class="text-xl mb-3">Agendado 🎉</h2>

    <p id="cPet"></p>
    <p id="cDate"></p>
    <p id="cTime"></p>

    <button onclick="goTo('login')" class="mt-4 bg-blue-500 text-white px-4 py-2 rounded">
      Voltar
    </button>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
